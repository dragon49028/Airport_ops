spring:
  main:
    allow-circular-references: true  # <- ADD THIS LINE
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    # ... rest stays exactly the same
    url: jdbc:h2:mem:airportdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  data:
    auditing:
      enabled: true

server:
  port: 8080

jwt:
  secret: airportGroundOpsSecretKey2024VeryLongSecretKeyForJWTSigning
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  rate-limit:
    capacity: 100
    refill-per-minute: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: AeroOps Ground Management
    version: 2.0.0
    description: Airport Ground Operations Management System

logging:
  level:
    com.airport: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:airport_ops}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:airport}
    password: ${MYSQL_PASSWORD:airport123}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:airportGroundOpsSecretKey2024VeryLongSecretKeyForJWTSigning}
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

